version: 2

models:
  - name: gold_dim_store
    description: "Store dimension (SCD Type 2) — tracks attribute changes with valid_from/valid_to (Gold layer)"
    columns:
      - name: dim_store_key
        description: Surrogate key (md5 of store_token + valid_from)
        tests: [not_null, unique]
      - name: store_token
        description: Natural store identifier (UUID)
        tests: [not_null]
      - name: store_group
        description: Store group code (8-char hex)
        tests: [not_null]
      - name: store_name
        description: Store display name
        tests: [not_null]
      - name: is_current
        description: Whether this is the active record for the store
        tests: [not_null]

  - name: gold_fact_sales
    description: "Deduplicated valid sales — keyed by (store_token, transaction_id), latest received wins (Gold layer)"
    columns:
      - name: store_token
        description: Store that made the sale
        tests: [not_null]
      - name: transaction_id
        description: Transaction identifier
        tests: [not_null]
      - name: amount
        description: Sale amount in USD
        tests: [not_null]
      - name: transaction_time
        description: When the sale occurred
        tests: [not_null]
    tests:
      - unique:
          column_name: "store_token || '-' || transaction_id"
